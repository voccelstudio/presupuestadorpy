<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PresupuestadorPY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;1,400&family=Barlow+Condensed:wght@600;700;800&family=IBM+Plex+Mono:wght@400;600&family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
/* ── THEMES ── */
:root{
  --bg:#0f1117;--sur:#181c26;--sur2:#1e2330;--bor:#2a3040;
  --acc:#f59e0b;--acc2:#fbbf24;--tx:#f0e9d8;--tx2:#b8a98a;--tx3:#6b5f48;
  --ok:#34d399;--err:#f87171;--blue:#60a5fa;
  --mat:#34d399;--lab:#f59e0b;--matbg:rgba(52,211,153,.1);--labbg:rgba(245,158,11,.1);
  --iva:#818cf8;--ivabg:rgba(129,140,248,.1);
  --rad:6px;--sh:0 4px 24px rgba(0,0,0,.5);
  --font-body:'Barlow',sans-serif;--font-display:'Barlow Condensed',sans-serif;
}
[data-theme="light"]{
  --bg:#f4f1eb;--sur:#ffffff;--sur2:#f9f7f3;--bor:#e8e0d0;
  --acc:#c2410c;--acc2:#ea580c;--tx:#1c1410;--tx2:#5c4a36;--tx3:#a08060;
  --ok:#16a34a;--err:#dc2626;--blue:#2563eb;
  --mat:#15803d;--lab:#b45309;--matbg:rgba(21,128,61,.1);--labbg:rgba(180,83,9,.1);
  --iva:#4f46e5;--ivabg:rgba(79,70,229,.1);--rad:6px;--sh:0 2px 16px rgba(0,0,0,.08);
}
[data-theme="blueprint"]{
  --bg:#071525;--sur:#0c1f35;--sur2:#102846;--bor:rgba(96,165,250,.2);
  --acc:#38bdf8;--acc2:#7dd3fc;--tx:#e0f2fe;--tx2:#7dd3fc;--tx3:#2563eb;
  --ok:#34d399;--err:#f87171;--blue:#38bdf8;
  --mat:#34d399;--lab:#fbbf24;--matbg:rgba(52,211,153,.1);--labbg:rgba(251,191,36,.1);
  --iva:#a78bfa;--ivabg:rgba(167,139,250,.1);--rad:3px;--sh:0 0 24px rgba(56,189,248,.15);
  --font-body:'IBM Plex Mono',monospace;--font-display:'IBM Plex Mono',monospace;
}
[data-theme="elegant"]{
  --bg:#faf8f5;--sur:#ffffff;--sur2:#f5f2ed;--bor:#e0d8cc;
  --acc:#8b6914;--acc2:#a07820;--tx:#1a1410;--tx2:#5a4a30;--tx3:#9a8060;
  --ok:#2d6a4f;--err:#c0392b;--blue:#1a5276;
  --mat:#2d6a4f;--lab:#8b6914;--matbg:rgba(45,106,79,.08);--labbg:rgba(139,105,20,.08);
  --iva:#5b21b6;--ivabg:rgba(91,33,182,.08);--rad:2px;--sh:0 2px 12px rgba(0,0,0,.06);
  --font-body:'DM Sans',sans-serif;--font-display:'Playfair Display',serif;
}
[data-theme="neon"]{
  --bg:#050508;--sur:#0d0d14;--sur2:#12121c;--bor:#1f1f35;
  --acc:#a855f7;--acc2:#c084fc;--tx:#f5f3ff;--tx2:#c4b5fd;--tx3:#6d28d9;
  --ok:#4ade80;--err:#fb7185;--blue:#818cf8;
  --mat:#4ade80;--lab:#a855f7;--matbg:rgba(74,222,128,.1);--labbg:rgba(168,85,247,.1);
  --iva:#60a5fa;--ivabg:rgba(96,165,250,.1);--rad:8px;--sh:0 0 30px rgba(168,85,247,.2);
  --font-body:'Sora',sans-serif;--font-display:'Sora',sans-serif;
}
[data-theme="forest"]{
  --bg:#0d1a12;--sur:#132018;--sur2:#192a1f;--bor:#2a4035;
  --acc:#4ade80;--acc2:#86efac;--tx:#ecfdf5;--tx2:#a7f3d0;--tx3:#34d399;
  --ok:#4ade80;--err:#f87171;--blue:#67e8f9;
  --mat:#4ade80;--lab:#fbbf24;--matbg:rgba(74,222,128,.1);--labbg:rgba(251,191,36,.1);
  --iva:#818cf8;--ivabg:rgba(129,140,248,.1);--rad:5px;--sh:0 4px 20px rgba(0,0,0,.6);
  --font-body:'Barlow',sans-serif;--font-display:'Barlow Condensed',sans-serif;
}
[data-theme="copper"]{
  --bg:#1a0f0a;--sur:#26160e;--sur2:#301c12;--bor:#4a2e1a;
  --acc:#fb923c;--acc2:#fdba74;--tx:#fff7ed;--tx2:#fed7aa;--tx3:#c2693a;
  --ok:#4ade80;--err:#f87171;--blue:#60a5fa;
  --mat:#34d399;--lab:#fb923c;--matbg:rgba(52,211,153,.1);--labbg:rgba(251,146,60,.12);
  --iva:#e879f9;--ivabg:rgba(232,121,249,.1);--rad:4px;--sh:0 4px 24px rgba(0,0,0,.6);
  --font-body:'Barlow',sans-serif;--font-display:'Barlow Condensed',sans-serif;
}
[data-theme="midnight"]{
  --bg:#010409;--sur:#0d1117;--sur2:#161b22;--bor:#30363d;
  --acc:#58a6ff;--acc2:#79c0ff;--tx:#e6edf3;--tx2:#8b949e;--tx3:#484f58;
  --ok:#3fb950;--err:#f85149;--blue:#58a6ff;
  --mat:#3fb950;--lab:#d29922;--matbg:rgba(63,185,80,.1);--labbg:rgba(210,153,34,.1);
  --iva:#bc8cff;--ivabg:rgba(188,140,255,.1);--rad:6px;--sh:0 4px 24px rgba(0,0,0,.8);
  --font-body:'DM Sans',sans-serif;--font-display:'Barlow Condensed',sans-serif;
}
[data-theme="sand"]{
  --bg:#f7f3ee;--sur:#fffdf9;--sur2:#f0ebe3;--bor:#d6cfc4;
  --acc:#b45309;--acc2:#d97706;--tx:#1c1007;--tx2:#614b2e;--tx3:#9c7f5f;
  --ok:#16a34a;--err:#dc2626;--blue:#1d4ed8;
  --mat:#15803d;--lab:#b45309;--matbg:rgba(21,128,61,.08);--labbg:rgba(180,83,9,.08);
  --iva:#7c3aed;--ivabg:rgba(124,58,237,.08);--rad:3px;--sh:0 2px 12px rgba(0,0,0,.07);
  --font-body:'DM Sans',sans-serif;--font-display:'Playfair Display',serif;
}
[data-theme="crimson"]{
  --bg:#0f0508;--sur:#1a0a0f;--sur2:#220e14;--bor:#3d1520;
  --acc:#f43f5e;--acc2:#fb7185;--tx:#fff1f2;--tx2:#fda4af;--tx3:#9f1239;
  --ok:#4ade80;--err:#f43f5e;--blue:#60a5fa;
  --mat:#4ade80;--lab:#f43f5e;--matbg:rgba(74,222,128,.1);--labbg:rgba(244,63,94,.12);
  --iva:#e879f9;--ivabg:rgba(232,121,249,.1);--rad:6px;--sh:0 0 28px rgba(244,63,94,.2);
  --font-body:'Sora',sans-serif;--font-display:'Sora',sans-serif;
}
[data-theme="slate"]{
  --bg:#f8fafc;--sur:#ffffff;--sur2:#f1f5f9;--bor:#cbd5e1;
  --acc:#0f172a;--acc2:#1e293b;--tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;
  --ok:#16a34a;--err:#dc2626;--blue:#2563eb;
  --mat:#0891b2;--lab:#0f172a;--matbg:rgba(8,145,178,.08);--labbg:rgba(15,23,42,.06);
  --iva:#7c3aed;--ivabg:rgba(124,58,237,.07);--rad:4px;--sh:0 1px 8px rgba(0,0,0,.06);
  --font-body:'DM Sans',sans-serif;--font-display:'Barlow Condensed',sans-serif;
}
[data-theme="obsidian"]{
  --bg:#09090b;--sur:#18181b;--sur2:#1f1f23;--bor:#27272a;
  --acc:#e4e4e7;--acc2:#f4f4f5;--tx:#fafafa;--tx2:#a1a1aa;--tx3:#52525b;
  --ok:#22c55e;--err:#ef4444;--blue:#60a5fa;
  --mat:#22c55e;--lab:#e4e4e7;--matbg:rgba(34,197,94,.1);--labbg:rgba(228,228,231,.08);
  --iva:#818cf8;--ivabg:rgba(129,140,248,.1);--rad:2px;--sh:0 4px 24px rgba(0,0,0,.9);
  --font-body:'IBM Plex Mono',monospace;--font-display:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--font-body);font-size:14px;transition:background .3s,color .3s;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--sur);}
::-webkit-scrollbar-thumb{background:var(--bor);border-radius:2px;}

/* ── HEADER ── */
.hdr{background:var(--sur);border-bottom:1px solid var(--bor);padding:0 14px;height:52px;display:flex;align-items:center;gap:6px;position:sticky;top:0;z-index:100;flex-wrap:nowrap;overflow-x:auto;}
.logo{font-family:var(--font-display);font-size:1.15rem;font-weight:800;color:var(--acc);letter-spacing:.02em;flex-shrink:0;display:flex;align-items:center;gap:7px;margin-right:4px;}
.logo-dot{width:7px;height:7px;background:var(--acc);border-radius:50%;box-shadow:0 0 8px var(--acc);}
.db-badge{font-size:.875rem;background:var(--matbg);color:var(--mat);border:1px solid rgba(52,211,153,.3);padding:2px 7px;border-radius:999px;font-weight:600;white-space:nowrap;}
.nbtn{padding:5px 11px;border-radius:var(--rad);border:1px solid var(--bor);background:transparent;color:var(--tx2);font-family:var(--font-body);font-size:.875rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.nbtn:hover,.nbtn.on{background:var(--acc);color:var(--bg);border-color:var(--acc);}
.nbtn.xls{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.35);color:var(--ok);}
.nbtn.xls:hover{background:var(--ok);color:var(--bg);}
.nbtn.pdf-btn{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.4);color:var(--acc);}
.nbtn.pdf-btn:hover{background:var(--acc);color:var(--bg);}

/* ── LAYOUT ── */
.main{display:grid;grid-template-columns:280px 1fr;gap:12px;padding:14px;max-width:1440px;margin:0 auto;align-items:start;}
.card{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad);padding:14px;transition:background .3s,border-color .3s;}

/* ── INPUTS ── */
input,textarea,select{width:100%;padding:7px 10px;border-radius:var(--rad);border:1px solid var(--bor);background:var(--sur2);color:var(--tx);font-family:var(--font-body);font-size:.95rem;outline:none;transition:border-color .15s;}
input:focus,textarea:focus{border-color:var(--acc);}
input::placeholder,textarea::placeholder{color:var(--tx3);}
input.sm{padding:4px 8px;font-size:.875rem;}

/* ── CATALOG ── */
.srch{position:relative;margin-bottom:9px;}
.srch input{padding-left:28px;}
.srch-ico{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:1rem;pointer-events:none;}
.cat-scroll{max-height:62vh;overflow-y:auto;}
.cat-hdr{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-radius:var(--rad);cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:.95rem;text-transform:uppercase;letter-spacing:.07em;color:var(--tx2);border:none;background:transparent;width:100%;text-align:left;transition:all .12s;}
.cat-hdr:hover,.cat-hdr.on{background:var(--labbg);color:var(--acc);}
.cat-item{display:flex;align-items:center;gap:4px;padding:5px 8px;border-radius:var(--rad);cursor:pointer;margin-left:6px;transition:background .1s;}
.cat-item:hover{background:var(--sur2);}
.iname{font-size:.95rem;color:var(--tx2);flex:1;line-height:1.3;}
.pchips{display:flex;flex-direction:column;gap:1px;align-items:flex-end;flex-shrink:0;}
.ptot{font-size:.95rem;font-weight:700;color:var(--acc);}
.pmat{font-size:.875rem;font-weight:600;color:var(--mat);background:var(--matbg);padding:1px 5px;border-radius:999px;}
.plab{font-size:.875rem;font-weight:600;color:var(--lab);background:var(--labbg);padding:1px 5px;border-radius:999px;}
.utag{font-size:.875rem;font-weight:700;color:var(--blue);background:rgba(96,165,250,.12);padding:1px 5px;border-radius:999px;white-space:nowrap;flex-shrink:0;}
.addbtn{width:18px;height:18px;border-radius:50%;background:var(--acc);border:none;color:var(--bg);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;transition:transform .12s;}
.addbtn:hover{transform:scale(1.2);}

/* ── PROJECT FORM ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px;}
.fullcol{grid-column:1/-1;}
.prof-row{display:flex;align-items:center;gap:7px;padding:8px 12px;background:var(--sur2);border-radius:var(--rad);margin-bottom:7px;flex-wrap:wrap;border:1px solid var(--bor);}
.opt-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:var(--rad);margin-bottom:7px;border:1px dashed var(--bor);flex-wrap:wrap;}
.toggle{position:relative;width:32px;height:18px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.tslider{position:absolute;inset:0;background:var(--bor);border-radius:999px;cursor:pointer;transition:.2s;}
.toggle input:checked+.tslider{background:var(--acc);}
.tslider:before{content:"";position:absolute;width:12px;height:12px;left:3px;bottom:3px;background:var(--bg);border-radius:50%;transition:.2s;}
.toggle input:checked+.tslider:before{transform:translateX(14px);}

/* ── TABLE ── */
.bud-hdr{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
table.tbl{width:100%;border-collapse:collapse;font-size:1rem;}
.tbl th{text-align:left;padding:5px 7px;font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--tx3);border-bottom:1px solid var(--bor);}
.tbl td{padding:6px 7px;color:var(--tx2);border-bottom:1px solid var(--bor);vertical-align:middle;transition:background .1s;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--sur2);}
.tbl-cat td{background:var(--sur2)!important;font-family:var(--font-display);font-weight:700;font-size:.95rem;text-transform:uppercase;letter-spacing:.08em;color:var(--acc);padding:4px 7px;}
.qty-in{width:55px;padding:3px 6px;font-size:.875rem;text-align:center;}
.delbtn{width:20px;height:20px;border-radius:50%;background:transparent;border:1px solid var(--bor);color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all .12s;}
.delbtn:hover{background:rgba(248,113,113,.15);border-color:#f87171;color:#f87171;}
.ichip{font-size:.875rem;font-weight:600;padding:1px 5px;border-radius:999px;}
.ichip.mat{background:var(--matbg);color:var(--mat);}
.ichip.lab{background:var(--labbg);color:var(--lab);}
.cbar{display:flex;height:3px;border-radius:2px;overflow:hidden;margin-top:3px;width:60px;}
.cbar-m{background:var(--mat);}
.cbar-l{background:var(--lab);}

/* ── IVA badge ── */
.iva-badge{font-size:.875rem;font-weight:700;padding:1px 5px;border-radius:999px;background:var(--ivabg);color:var(--iva);white-space:nowrap;}

/* ── TOTALS ── */
.totals{border-top:1px solid var(--bor);padding:11px 8px 4px;margin-top:4px;}
.tot-row{display:flex;justify-content:space-between;padding:3px 0;}
.tot-lbl{font-size:.875rem;color:var(--tx2);}
.tot-val{font-size:.95rem;font-weight:600;}
.tot-mat{color:var(--mat);}
.tot-lab{color:var(--lab);}
.tot-iva{color:var(--iva);}
.tot-sub{border-top:1px solid var(--bor);margin-top:3px;padding-top:5px;}
.tot-main{border-top:2px solid var(--acc);margin-top:7px;padding-top:8px;}
.tot-main .tot-lbl{font-family:var(--font-display);font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--tx);}
.tot-main .tot-val{font-family:var(--font-display);font-size:1.4rem;font-weight:800;color:var(--acc);}
.disc{font-size:1rem;color:var(--tx3);margin-top:7px;padding-top:7px;border-top:1px solid var(--bor);font-style:italic;}
.empty{text-align:center;padding:44px 16px;color:var(--tx3);}
.empty-ico{font-size:2.2rem;margin-bottom:8px;}

/* ── BUTTONS ── */
.btn{padding:6px 14px;border-radius:var(--rad);border:1px solid var(--bor);background:transparent;color:var(--tx2);font-family:var(--font-body);font-size:.875rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .12s;}
.btn:hover{border-color:var(--acc);color:var(--acc);}
.btn.primary{background:var(--acc);color:var(--bg);border-color:var(--acc);}
.btn.primary:hover{background:var(--acc2);}
.btn.success{background:var(--ok);color:var(--bg);border-color:var(--ok);}
.btn.danger:hover{color:var(--err);border-color:var(--err);}
.btn.sm{padding:3px 10px;font-size:.95rem;}

/* ── PRICE PANEL ── */
.prices-wrap{padding:14px;max-width:1440px;margin:0 auto;}
.prices-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:10px;}
.pcard{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad);padding:12px;}
.pcat-tag{font-family:var(--font-display);font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--acc);background:var(--labbg);padding:2px 8px;border-radius:999px;display:inline-block;margin-bottom:8px;}
.price-row{padding:5px 0;border-bottom:1px solid var(--bor);}
.price-row:last-child{border-bottom:none;}
.pname{font-size:.95rem;color:var(--tx2);margin-bottom:3px;line-height:1.3;}
.pfields{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.pchip{padding:3px 8px;border-radius:999px;font-size:.95rem;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .12s;}
.pchip.mat{background:var(--matbg);color:var(--mat);}
.pchip.mat:hover{border-color:var(--mat);}
.pchip.lab{background:var(--labbg);color:var(--lab);}
.pchip.lab:hover{border-color:var(--lab);}
.pchip.tot{background:var(--labbg);color:var(--acc);}
.pchip.tot:hover{border-color:var(--acc);}
.pchip.ro{cursor:default;}
.pedit{width:108px;padding:3px 7px;border-radius:999px;border:1.5px solid var(--acc);background:var(--sur2);color:var(--tx);font-size:.95rem;font-weight:600;text-align:right;outline:none;}
.pctbadge{font-size:.875rem;color:var(--tx3);background:var(--sur2);border:1px solid var(--bor);padding:1px 4px;border-radius:999px;}
.pct-pill{font-size:.875rem;font-weight:600;padding:1px 5px;border-radius:999px;}
.pct-pill.mat{background:var(--matbg);color:var(--mat);}
.pct-pill.lab{background:var(--labbg);color:var(--lab);}

/* ── THEMES SECTION ── */
.theme-wrap{padding:14px;max-width:1440px;margin:0 auto;}
.theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:24px;}
.theme-card{border-radius:10px;overflow:hidden;cursor:pointer;border:3px solid transparent;transition:all .2s;position:relative;}
.theme-card.active{border-color:var(--acc);box-shadow:0 0 20px rgba(245,158,11,.3);}
.theme-card:hover{transform:translateY(-2px);}
.theme-preview{height:78px;display:flex;flex-direction:column;gap:5px;padding:9px;}
.theme-preview-hdr{height:13px;border-radius:3px;opacity:.9;}
.theme-preview-body{display:flex;gap:5px;flex:1;}
.theme-preview-sidebar{width:30%;border-radius:3px;opacity:.7;}
.theme-preview-content{flex:1;display:flex;flex-direction:column;gap:3px;}
.theme-preview-row{height:7px;border-radius:2px;opacity:.6;}
.theme-preview-row:last-child{width:60%;}
.theme-preview-accent{height:11px;border-radius:3px;margin-top:auto;}
.theme-label{padding:8px 11px;font-size:1rem;font-weight:600;display:flex;align-items:center;justify-content:space-between;}
.theme-check{width:16px;height:16px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:1rem;}
.sec-lbl{font-family:var(--font-display);font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--tx3);margin-bottom:12px;}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(4px);}
.modal{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad);padding:20px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--sh);}
.modal-title{font-family:var(--font-display);font-size:1rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--tx);margin-bottom:13px;display:flex;justify-content:space-between;align-items:center;}
.modal-row{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:var(--rad);margin-bottom:3px;background:var(--sur2);}
.modal-name{font-size:1rem;font-weight:600;flex:1;}
.modal-meta{font-size:.95rem;color:var(--tx3);}
.modal-acts{display:flex;gap:6px;justify-content:flex-end;margin-top:12px;}
.slbl{font-family:var(--font-display);font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin:10px 0 5px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:7px;}
.bk-tbl{width:100%;border-collapse:collapse;font-size:1rem;}
.bk-tbl th{padding:5px 8px;font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);border-bottom:1px solid var(--bor);text-align:right;}
.bk-tbl th:first-child{text-align:left;}
.bk-tbl td{padding:6px 8px;border-bottom:1px solid var(--bor);text-align:right;color:var(--tx2);}
.bk-tbl td:first-child{text-align:left;font-weight:600;color:var(--tx);font-size:.875rem;}
.bk-footer{background:var(--sur2);border:1px solid var(--bor);border-radius:var(--rad);padding:13px;margin-top:10px;}
.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-top:10px;}
.mat-card{background:var(--sur2);border:1px solid var(--bor);border-radius:var(--rad);padding:10px 12px;}
.mat-name{font-size:1rem;font-weight:600;color:var(--tx);margin-bottom:3px;line-height:1.3;}
.mat-qty{font-size:.875rem;color:var(--tx3);}
.mat-qty strong{color:var(--acc);}
.mat-bags{font-size:.95rem;color:var(--mat);font-weight:700;margin-top:2px;}
.mat-note{font-size:1rem;color:var(--tx3);font-style:italic;margin-bottom:10px;}
/* PDF theme picker */
.pdf-theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:12px 0;}
.pdf-theme-card{border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .18s;}
.pdf-theme-card:hover{transform:translateY(-2px);}
.pdf-theme-card.active{border-color:var(--acc);box-shadow:0 0 12px rgba(245,158,11,.3);}
.pdf-preview{height:68px;padding:8px;display:flex;flex-direction:column;gap:4px;}
.pdf-preview-hdr{height:16px;border-radius:3px;}
.pdf-preview-row{height:6px;border-radius:2px;opacity:.7;}
.pdf-preview-row.short{width:55%;}
.pdf-preview-accent{height:9px;border-radius:2px;margin-top:auto;}
.pdf-theme-lbl{padding:6px 9px;font-size:.875rem;font-weight:600;display:flex;justify-content:space-between;align-items:center;}
/* Export cards */
.export-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;}
.export-card{background:var(--sur2);border:1px solid var(--bor);border-radius:var(--rad);padding:14px;cursor:pointer;transition:all .15s;text-align:center;}
.export-card:hover{border-color:var(--acc);}
.export-icon{font-size:1.8rem;margin-bottom:7px;}
.export-name{font-size:.95rem;font-weight:600;color:var(--tx);margin-bottom:4px;}
.export-desc{font-size:.95rem;color:var(--tx3);}
/* Info box */
.info-box{background:var(--ivabg);border:1px solid var(--iva);border-radius:var(--rad);padding:10px 13px;margin-bottom:12px;}
.info-box p{font-size:.875rem;color:var(--tx2);line-height:1.5;}
/* Toast */
.toast{position:fixed;bottom:16px;right:16px;padding:9px 18px;border-radius:var(--rad);font-size:1rem;font-weight:600;z-index:400;background:var(--ok);color:var(--bg);box-shadow:var(--sh);font-family:var(--font-body);}
.flex{display:flex;align-items:center;}
.gap6{gap:6px;}
.mb7{margin-bottom:7px;}
.mt7{margin-top:7px;}

/* ── ÍTEM PERSONALIZADO ── */
.custom-item-row{display:flex;gap:6px;align-items:center;padding:8px;background:var(--ivabg);border:1px dashed var(--iva);border-radius:var(--rad);margin-bottom:7px;}
.custom-item-row input{flex:1;font-size:.875rem;}
.custom-item-row input.price{width:110px;flex:none;}
.custom-item-row input.unit{width:55px;flex:none;}
/* ── NOTAS POR ÍTEM ── */
.item-note-input{font-size:.95rem;padding:2px 6px;border-radius:3px;border:1px dashed var(--bor);background:var(--sur);color:var(--tx3);width:100%;margin-top:3px;resize:none;}
.item-note-input:focus{border-color:var(--acc);color:var(--tx);}
/* ── DESCUENTO POR ÍTEM ── */
.disc-badge{font-size:.875rem;font-weight:700;padding:1px 5px;border-radius:999px;background:rgba(52,211,153,.15);color:var(--ok);white-space:nowrap;}
/* ── COSTO M² ── */
.m2-panel{background:var(--sur2);border:1px solid var(--bor);border-radius:var(--rad);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.m2-val{font-family:var(--font-display);font-size:1.6rem;font-weight:800;color:var(--acc);}
.m2-lbl{font-size:.95rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-top:2px;}
.m2-ref{font-size:.95rem;color:var(--tx2);background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad);padding:6px 10px;}
.m2-ref span{font-weight:700;color:var(--acc);}
/* ── DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px;}
.dash-card{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad);padding:14px;}
.dash-num{font-family:var(--font-display);font-size:1.8rem;font-weight:800;color:var(--acc);}
.dash-lbl{font-size:.95rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.dash-sub{font-size:.875rem;color:var(--tx2);margin-top:5px;}
/* ── PLANTILLAS ── */
.tmpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:16px;}
.tmpl-card{background:var(--sur2);border:1px solid var(--bor);border-radius:var(--rad);padding:14px;cursor:pointer;transition:all .15s;}
.tmpl-card:hover{border-color:var(--acc);transform:translateY(-2px);}
.tmpl-icon{font-size:1.6rem;margin-bottom:6px;}
.tmpl-name{font-weight:700;font-size:.95rem;color:var(--tx);margin-bottom:3px;}
.tmpl-desc{font-size:.95rem;color:var(--tx3);line-height:1.4;}
.tmpl-meta{font-size:1rem;color:var(--acc);margin-top:5px;font-weight:600;}
/* ── HISTORIAL PRECIOS ── */
.hist-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--rad);border-bottom:1px solid var(--bor);}
.hist-name{font-size:1rem;flex:1;color:var(--tx);}
.hist-bar-wrap{flex:2;height:6px;background:var(--sur2);border-radius:3px;overflow:hidden;}
.hist-bar{height:100%;border-radius:3px;background:var(--acc);}
.hist-pct{font-size:.95rem;font-weight:700;width:44px;text-align:right;}
.hist-pct.up{color:var(--err);}
.hist-pct.dn{color:var(--ok);}
/* ── FIRMA DIGITAL ── */
.sign-canvas{border:1px solid var(--bor);border-radius:var(--rad);background:var(--sur2);touch-action:none;cursor:crosshair;display:block;width:100%;}
/* ── ALERTAS ── */
.alert-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--rad);margin-bottom:5px;}
.alert-row.warn{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);}
.alert-row.ok{background:var(--matbg);border:1px solid rgba(52,211,153,.2);}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.alert-dot.warn{background:var(--acc);}
.alert-dot.ok{background:var(--ok);}
.alert-txt{font-size:.875rem;flex:1;color:var(--tx2);}
.alert-date{font-size:.95rem;color:var(--tx3);}


/* ── AUTH ── */
.auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;}
.auth-box{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:32px;width:100%;max-width:400px;box-shadow:var(--sh);}
.auth-logo{font-family:var(--font-display);font-size:1.4rem;font-weight:800;color:var(--acc);text-align:center;margin-bottom:6px;letter-spacing:.02em;}
.auth-sub{text-align:center;font-size:1rem;color:var(--tx3);margin-bottom:24px;}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--bor);border-radius:var(--rad);overflow:hidden;}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:1rem;font-weight:600;cursor:pointer;background:transparent;border:none;color:var(--tx2);transition:all .15s;}
.auth-tab.on{background:var(--acc);color:var(--bg);}
.auth-inp{margin-bottom:12px;}
.auth-inp label{display:block;font-size:.95rem;color:var(--tx3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
.auth-btn{width:100%;padding:10px;border-radius:var(--rad);border:none;cursor:pointer;font-family:var(--font-body);font-size:.95rem;font-weight:700;transition:all .15s;}
.auth-btn.primary{background:var(--acc);color:var(--bg);margin-bottom:10px;}
.auth-btn.primary:hover{opacity:.9;}
.auth-btn.google{background:var(--sur2);color:var(--tx);border:1px solid var(--bor);display:flex;align-items:center;justify-content:center;gap:8px;}
.auth-btn.google:hover{border-color:var(--acc);}
.auth-divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--tx3);font-size:.95rem;}
.auth-divider::before,.auth-divider::after{content:"";flex:1;height:1px;background:var(--bor);}
.auth-err{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:#f87171;font-size:.875rem;padding:8px 10px;border-radius:var(--rad);margin-bottom:10px;}
.user-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:var(--sur2);border:1px solid var(--bor);cursor:pointer;font-size:.95rem;color:var(--tx2);flex-shrink:0;}
.user-chip:hover{border-color:var(--acc);color:var(--acc);}
.user-avatar{width:22px;height:22px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:var(--bg);}
.cloud-badge{font-size:.875rem;background:rgba(96,165,250,.15);color:var(--blue);border:1px solid rgba(96,165,250,.3);padding:2px 7px;border-radius:999px;font-weight:600;white-space:nowrap;}

</style>

// ── IVA CALCULATIONS ──────────────────────────────────────────────────
function calcIVA(matCost,laborCost,qty=1){
  if(!state.ivaEnabled)return{ivaMat:0,ivaLab:0,ivaTotal:0};
  const ivaMat=Math.round(matCost*qty*IVA_MAT);
  const ivaLab=Math.round(laborCost*qty*IVA_LAB);
  return{ivaMat,ivaLab,ivaTotal:ivaMat+ivaLab};
}
function calcIVATotals(){
  let ivaMat=0,ivaLab=0;
  for(const i of state.items){
    ivaMat+=Math.round((i.matCost||0)*i.qty*IVA_MAT);
    ivaLab+=Math.round((i.laborCost||0)*i.qty*IVA_LAB);
  }
  return{ivaMat,ivaLab,ivaTotal:ivaMat+ivaLab};
}

// ── TOTALS ──────────────────────────────────────────────────────────
function effPrice(i){return i.unitPrice*(1-(i.disc||0)/100);}
function getTotals(){
  const totalMats=state.items.reduce((s,i)=>s+(i.matCost||0)*(1-(i.disc||0)/100)*i.qty,0);
  const totalLabor=state.items.reduce((s,i)=>s+(i.laborCost||0)*(1-(i.disc||0)/100)*i.qty,0);
  const subtotal=state.items.reduce((s,i)=>s+effPrice(i)*i.qty,0);
  const{ivaMat,ivaLab,ivaTotal}=calcIVATotals();
  const profitBase=subtotal+ivaTotal;
  const profitAmt=profitBase*(state.profitPct/100);
  const total=subtotal+ivaTotal+profitAmt;
  return{totalMats,totalLabor,subtotal,ivaMat,ivaLab,ivaTotal,profitAmt,total};
}
function getGrouped(){const g={};for(const i of state.items){if(!g[i.cat])g[i.cat]=[];g[i.cat].push(i);}return g;}
function getBreakdown(){
  return Object.entries(getGrouped()).map(([cat,ci])=>({cat,
    matCost:ci.reduce((s,i)=>s+(i.matCost||0)*i.qty,0),
    laborCost:ci.reduce((s,i)=>s+(i.laborCost||0)*i.qty,0),
    total:ci.reduce((s,i)=>s+i.unitPrice*i.qty,0)
  }));
}
function calcMaterials(){
  const map={};
  for(const item of state.items)
    for(const m of(item.mats||[])){
      const k=m.n+"||"+m.u;
      if(!map[k])map[k]={name:m.n,unit:m.u,qty:0};
      map[k].qty+=m.q*item.qty;
    }
  return Object.values(map).sort((a,b)=>a.name.localeCompare(b.name));
}

function renderPrices(){
  const el=document.getElementById("section-prices");
  let h=`<div class="prices-wrap">

      <span style="font-family:var(--font-display);font-size:1.05rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em">Base de Precios</span>

        <input type="number" class="sm" style="width:60px" value="${state.adjustPct}" placeholder="%" oninput="state.adjustPct=parseFloat(this.value)||0" onkeydown="if(event.key==='Enter')applyGlobalAdjust()">
        <button class="btn sm primary" onclick="applyGlobalAdjust()">Aplicar</button>
        <span style="color:var(--tx3);font-size:.95rem">|</span>
        <span style="font-size:.95rem;color:var(--tx3)">Modo:</span>
        <button class="btn sm${state.priceEditMode==="total"?" primary":""}" onclick="state.priceEditMode='total';renderPrices()">Total</button>
        <button class="btn sm${state.priceEditMode==="breakdown"?" primary":""}" onclick="state.priceEditMode='breakdown';renderPrices()">Mat / MO</button>
        <button class="btn sm danger" onclick="if(confirm('Restaurar todos los precios a la DB original?')){DB=buildDB();save();renderPrices();toast('Precios restaurados');}">Restaurar</button>
      </div>
    </div>
    <div class="info-box"><p>Los precios reflejan el mercado de la construcción en Paraguay. Podés editar cualquier precio haciendo clic sobre él. Usá el ajuste global para aplicar un porcentaje de actualización a toda la base de una sola vez.</p></div>
    <div class="pgrid">`;
  for(const[cat,items] of Object.entries(DB)){
    h+=`<div class="pcard"><span class="pcat-tag">${cat}</span>`;
    for(const[name,data] of Object.entries(items)){
      const key=cat+"||"+name;const isEdit=state.editPriceKey===key;
      const ek=key.replace(/'/g,"\\'");
      h+=`<div class="price-row"><div class="pname">${name} <span style="font-size:.875rem;color:var(--tx3)">${data.unit}</span></div><div class="pfields">`;
      if(state.priceEditMode==="breakdown"){
        if(isEdit&&state.editField==="matCost")h+=`<input class="pedit" type="number" value="${data.matCost}" autofocus onblur="editPrice('${ek}','matCost',this.value)" onkeydown="if(event.key==='Enter')this.blur()">`;
        else h+=`<span class="pchip mat" onclick="state.editPriceKey='${ek}';state.editField='matCost';renderPrices()">Mat ₲${fmt(data.matCost)}</span>`;
        if(isEdit&&state.editField==="laborCost")h+=`<input class="pedit" type="number" value="${data.laborCost}" autofocus onblur="editPrice('${ek}','laborCost',this.value)" onkeydown="if(event.key==='Enter')this.blur()">`;
        else h+=`<span class="pchip lab" onclick="state.editPriceKey='${ek}';state.editField='laborCost';renderPrices()">MO ₲${fmt(data.laborCost)}${data.laborPct!=null?`<span class="pctbadge">${data.laborPct}%</span>`:""}</span>`;
        h+=`<span class="pchip tot ro">= ₲${fmt(data.total)}</span>`;
      } else {
        h+=`<span class="pct-pill mat">${Math.round(data.matCost/data.total*100)}% mat</span><span class="pct-pill lab">${Math.round(data.laborCost/data.total*100)}% MO</span>`;
        if(isEdit)h+=`<input class="pedit" type="number" value="${data.total}" autofocus onblur="editPrice('${ek}','total',this.value)" onkeydown="if(event.key==='Enter')this.blur()">`;
        else h+=`<span class="pchip tot" onclick="state.editPriceKey='${ek}';state.editField='total';renderPrices()">₲${fmt(data.total)}</span>`;
      }
      h+=`</div></div>`;
    }
    h+=`</div>`;
  }
  el.innerHTML=h+`</div></div>`;
}
function editPrice(key,field,val){
  const v=parseFloat(val);if(isNaN(v)||v<0){state.editPriceKey=null;renderPrices();return;}
  const sep=key.indexOf("||");const cat=key.slice(0,sep);const name=key.slice(sep+2);
  const item={...DB[cat][name]};
  if(field==="matCost"){item.matCost=v;if(item.laborPct!=null)item.laborCost=Math.round(v*item.laborPct/100);item.total=item.matCost+item.laborCost;}
  else if(field==="laborCost"){item.laborCost=v;item.laborPct=null;item.total=item.matCost+v;}
  else{const r=v/(item.total||1);item.matCost=Math.round(item.matCost*r);item.laborCost=Math.round(item.laborCost*r);item.total=v;}
  DB[cat][name]=item;state.editPriceKey=null;save();renderPrices();
}
function applyGlobalAdjust(){
  const pct=state.adjustPct;
  if(isNaN(pct)||pct===0){toast("Ingresá un % de ajuste",false);return;}
  const factor=1+pct/100;
  for(const cat of Object.values(DB))
    for(const item of Object.values(cat)){
      item.matCost=Math.round(item.matCost*factor);
      item.laborCost=Math.round(item.laborCost*factor);
      item.total=item.matCost+item.laborCost;
    }
  save();renderPrices();updateBadge();toast(`Precios ajustados ${pct>0?"+":""}${pct}% ✓`);
}

function exportXLS(){
  const{totalMats,totalLabor,subtotal,ivaMat,ivaLab,ivaTotal,profitAmt,total}=getTotals();
  const grouped=getGrouped();
  const BOM="\uFEFF",nl="\r\n",q=v=>`"${String(v).replace(/"/g,'""')}"`;
  let csv=BOM;
  csv+=q("PRESUPUESTO Nº")+","+q(String(state.budgetNum).padStart(4,"0"))+nl;
  csv+=q("Proyecto")+","+q(state.projectName)+nl;
  csv+=q("Cliente")+","+q(state.clientName||"-")+nl;
  csv+=q("Dirección")+","+q(state.clientAddress||"-")+nl;
  csv+=q("Fecha")+","+q(new Date().toLocaleDateString("es-PY"))+nl;
  csv+=q("Validez")+","+q(state.validDays+" días")+nl;
  csv+=q("Referencia precios")+","+q("Guía de precios de la construcción - Paraguay")+nl;
  if(state.profile.professional)csv+=q("Profesional")+","+q(state.profile.professional)+nl;
  if(state.profile.ruc)csv+=q("RUC")+","+q(state.profile.ruc)+nl;
  csv+=nl;
  const ivaHeader=state.ivaEnabled?q("IVA mat (₲)")+","+q("IVA MO (₲)")+","+q("IVA Total (₲)")+",":"";
  csv+=q("CATEGORÍA")+","+q("DESCRIPCIÓN")+","+q("UNIDAD")+","+q("CANTIDAD")+","+q("DESC.%")+","+q("MATERIALES (₲)")+","+q("MANO DE OBRA (₲)")+","+q("P. UNITARIO (₲)")+","+ivaHeader+q("TOTAL (₲)")+","+q("NOTA INTERNA")+nl;
  for(const[cat,ci] of Object.entries(grouped)){
    for(const item of ci){
      const ep=effPrice(item);
      const{ivaMat,ivaLab,ivaTotal}=calcIVA(item.matCost,item.laborCost,item.qty);
      const totalItem=ep*item.qty+ivaTotal;
      const ivaRow=state.ivaEnabled?q(Math.round(ivaMat))+","+q(Math.round(ivaLab))+","+q(Math.round(ivaTotal))+",":"";
      csv+=q(cat)+","+q(item.name)+","+q(item.unit)+","+q(item.qty)+","+q(item.disc||0)+","+q(Math.round(item.matCost))+","+q(Math.round(item.laborCost))+","+q(Math.round(ep))+","+ivaRow+q(Math.round(totalItem))+","+q(item.note||"")+nl;
    }
  }
  csv+=nl;
  csv+=q("RESUMEN")+nl;
  csv+=q("Materiales")+",,,,,,,"+q(Math.round(totalMats))+nl;
  csv+=q("Mano de Obra")+",,,,,,,"+q(Math.round(totalLabor))+nl;
  csv+=q("Costo Directo")+",,,,,,,"+q(Math.round(subtotal))+nl;
  if(state.ivaEnabled){
    csv+=q("IVA Materiales (10%)")+",,,,,,,"+q(Math.round(ivaMat))+nl;
    csv+=q("IVA Mano de Obra (5%)")+",,,,,,,"+q(Math.round(ivaLab))+nl;
    csv+=q("Total IVA")+",,,,,,,"+q(Math.round(ivaTotal))+nl;
  }
  if(state.profitPct>0)csv+=q("Honorarios ("+state.profitPct+"%)")+",,,,,,,"+q(Math.round(profitAmt))+nl;
  csv+=q("TOTAL"+(state.ivaEnabled?" (IVA incluido)":""))+",,,,,,,"+q(Math.round(total))+nl;
  const mats=calcMaterials();
  if(mats.length>0){
    csv+=nl+q("CÓMPUTO DE MATERIALES")+nl;
    csv+=q("MATERIAL")+","+q("CANTIDAD")+","+q("UNIDAD")+","+q("BOLSAS 50kg")+nl;
    for(const m of mats){
      const isCem=m.name.toLowerCase().includes("cemento");
      csv+=q(m.name)+","+q(fmtD(m.qty,3))+","+q(m.unit)+","+q(isCem?Math.ceil(m.qty/50):"")+nl;
    }
  }
  if(state.notes.trim())csv+=nl+q("NOTAS")+nl+q(state.notes)+nl;
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`Presupuesto_${String(state.budgetNum).padStart(4,"0")}_${(state.clientName||"Cliente").replace(/\s+/g,"_")}.csv`;
  a.click();URL.revokeObjectURL(url);
  toast("Archivo exportado ✓");closeModal();
}

// ── PDF ────────────────────────────────────────────────────────────────
function generarPDF(){

  const W=210,M=14;
  const p=state.profile;
  const{subtotal,ivaMat,ivaLab,ivaTotal,profitAmt,total}=getTotals();
  const grouped=getGrouped();

    minimal:     {hdrBg:[17,17,17],    hdrTx:[255,255,255],accentBg:[17,17,17],    accentTx:[255,255,255],catBg:[245,245,245],catTx:[50,50,50],   bodyTx:[30,30,30],  mutedTx:[100,100,100],borderC:[210,210,210],altRow:[250,250,250],totalBg:[17,17,17],    totalTx:[255,255,255]},
    emerald:     {hdrBg:[6,78,59],     hdrTx:[240,253,244],accentBg:[5,150,105],   accentTx:[255,255,255],catBg:[236,253,245],catTx:[6,78,59],    bodyTx:[6,28,21],   mutedTx:[52,105,79], borderC:[167,243,208],altRow:[240,253,244],totalBg:[6,78,59],    totalTx:[240,253,244]},
    bordeaux:    {hdrBg:[76,5,25],     hdrTx:[255,241,242],accentBg:[159,18,57],   accentTx:[255,255,255],catBg:[255,228,230],catTx:[136,19,55],  bodyTx:[30,5,12],   mutedTx:[100,40,55], borderC:[252,165,180],altRow:[255,241,242],totalBg:[76,5,25],    totalTx:[255,241,242]},
    slate:       {hdrBg:[30,41,59],    hdrTx:[248,250,252],accentBg:[71,85,105],   accentTx:[255,255,255],catBg:[241,245,249],catTx:[51,65,85],   bodyTx:[15,23,42],  mutedTx:[100,116,139],borderC:[203,213,225],altRow:[248,250,252],totalBg:[30,41,59],   totalTx:[248,250,252]},
  };
  const C=PALETTES[state.pdfTheme]||PALETTES.corporate;
  let y=0;
  // Header
  doc.setFillColor(...C.hdrBg);doc.rect(0,0,W,36,"F");
  doc.setFillColor(255,255,255,20);doc.circle(M+10,18,10,"F");
  doc.setTextColor(...C.hdrTx);doc.setFontSize(9);doc.setFont("helvetica","bold");
  doc.text((p.company||p.professional||"PY").substring(0,2).toUpperCase(),M+5.5,21);
  const tX=M+24;
  doc.setFontSize(13);doc.setFont("helvetica","bold");
  doc.text(p.company||p.professional||"PresupuestadorPY",tX,13);
  doc.setFontSize(7.5);doc.setFont("helvetica","normal");
  const lines=[];
  if(p.professional)lines.push(p.professional+(p.matricula?" — "+p.matricula:""));
  if(p.ruc)lines.push("RUC: "+p.ruc);
  if(p.phone||p.email)lines.push([p.phone,p.email].filter(Boolean).join("   ·   "));
  if(p.address)lines.push(p.address);
  const social=[p.instagram,p.whatsapp,p.website].filter(Boolean).join("   ·   ");
  if(social)lines.push(social);
  lines.forEach((l,i)=>doc.text(l,tX,19+i*4.5));
  doc.setFontSize(8);doc.setFont("helvetica","bold");doc.text("PRESUPUESTO",W-M,11,{align:"right"});
  doc.setFontSize(18);doc.text("Nº "+String(state.budgetNum).padStart(4,"0"),W-M,21,{align:"right"});
  doc.setFontSize(7.5);doc.setFont("helvetica","normal");doc.text(today,W-M,27,{align:"right"});
  y=42;
  // Client & Project boxes
  const colW=(W-M*2-5)/2;
  doc.setFillColor(...C.catBg);doc.roundedRect(M,y,colW,26,2,2,"F");
  doc.setDrawColor(...C.borderC);doc.setLineWidth(0.3);doc.roundedRect(M,y,colW,26,2,2,"S");
  doc.setFontSize(6.5);doc.setFont("helvetica","bold");doc.setTextColor(...C.accentBg);doc.text("CLIENTE",M+3,y+5.5);
  doc.setFont("helvetica","normal");doc.setTextColor(...C.bodyTx);doc.setFontSize(9.5);doc.text(state.clientName||"—",M+3,y+12,{maxWidth:colW-6});
  doc.setFontSize(7.5);doc.setTextColor(...C.mutedTx);
  if(state.clientAddress)doc.text(state.clientAddress,M+3,y+18,{maxWidth:colW-6});
  if(state.clientPhone)doc.text("Tel: "+state.clientPhone,M+3,y+23,{maxWidth:colW-6});
  const c2=M+colW+5;
  doc.setFillColor(248,250,252);doc.roundedRect(c2,y,colW,26,2,2,"F");doc.setDrawColor(...C.borderC);doc.roundedRect(c2,y,colW,26,2,2,"S");
  doc.setFontSize(6.5);doc.setFont("helvetica","bold");doc.setTextColor(...C.accentBg);doc.text("PROYECTO / OBRA",c2+3,y+5.5);
  doc.setFont("helvetica","normal");doc.setTextColor(...C.bodyTx);doc.setFontSize(9.5);doc.text(state.projectName||"—",c2+3,y+12,{maxWidth:colW-6});
  doc.setFontSize(7.5);doc.setTextColor(...C.mutedTx);
  doc.text("Validez: "+state.validDays+" días desde emisión",c2+3,y+18,{maxWidth:colW-6});
  doc.text("Presupuesto válido "+state.validDays+" días desde emisión",c2+3,y+23,{maxWidth:colW-6});
  y+=32;
  // Info strip
  const stripMsg=state.ivaEnabled&&state.ivaEnPDF
    ? "Precios unitarios incluyen materiales y mano de obra — IVA incluido (10% mat / 5% MO) — Valores en Guaranies (Gs.)"
    : "Precios unitarios incluyen materiales y mano de obra — Valores en Guaranies (Gs.) paraguayos";
  doc.setFillColor(254,243,199);doc.rect(M,y,W-M*2,6,"F");
  doc.setFontSize(6.5);doc.setFont("helvetica","italic");doc.setTextColor(146,64,14);
  doc.text("  "+stripMsg,M+2,y+4.2);
  y+=10;
  // Items table
  const rows=[];let rowNum=1;
  for(const[cat,ci] of Object.entries(grouped)){

    for(const item of ci){

      const totalItem=item.unitPrice*item.qty+(state.ivaEnabled&&state.ivaEnPDF?ivaItem:0);
      rows.push([
        {content:String(rowNum++),styles:{halign:"center",fontSize:7.5,textColor:C.mutedTx}},
        {content:item.name,styles:{fontSize:8}},
        {content:item.unit,styles:{halign:"center",fontSize:8}},
        {content:String(item.qty),styles:{halign:"center",fontSize:8}},
        {content:"Gs. "+fmt(item.unitPrice+(state.ivaEnabled&&state.ivaEnPDF?Math.round(ivaItem/item.qty):0)),styles:{halign:"right",fontSize:7.5}},
        {content:"Gs. "+fmt(totalItem),styles:{halign:"right",fontStyle:"bold",fontSize:7.5}},
      ]);
    }
  }
  doc.autoTable({
    startY:y,
    head:[[{content:"#",styles:{halign:"center"}},{content:"DESCRIPCIÓN / RUBRO"},{content:"UNID.",styles:{halign:"center"}},{content:"CANT.",styles:{halign:"center"}},{content:"PRECIO UNIT.",styles:{halign:"right"}},{content:"TOTAL",styles:{halign:"right"}}]],
    body:rows,theme:"plain",
    styles:{font:"helvetica",fontSize:8,cellPadding:{top:3,bottom:3,left:3,right:3},lineColor:C.borderC,lineWidth:0.2,textColor:C.bodyTx},
    headStyles:{fillColor:C.accentBg,textColor:C.accentTx,fontStyle:"bold",fontSize:7,cellPadding:{top:4,bottom:4,left:3,right:3}},
    alternateRowStyles:{fillColor:C.altRow},
    columnStyles:{0:{cellWidth:7,halign:"center"},1:{cellWidth:"auto"},2:{cellWidth:13,halign:"center"},3:{cellWidth:13,halign:"center"},4:{cellWidth:42,halign:"right"},5:{cellWidth:40,halign:"right"}},
    margin:{left:M,right:M},
    tableWidth:"wrap",
    didParseCell:data=>{if(data.row.raw?.[0]?.colSpan===6){data.cell.styles.fillColor=C.catBg;data.cell.styles.textColor=C.catTx;data.cell.styles.fontStyle="bold";}},
  });
  y=doc.lastAutoTable.finalY+8;
  // Totals box
  const totW=110;const totX=W-M-totW;
  if(y+40>275){doc.addPage();y=M;}
  doc.setFontSize(8);doc.setFont("helvetica","normal");doc.setTextColor(...C.mutedTx);
  doc.text("Subtotal materiales y mano de obra:",totX,y+5);
  doc.setTextColor(...C.bodyTx);doc.setFont("helvetica","bold");doc.text("Gs. "+fmt(subtotal),W-M,y+5,{align:"right"});y+=8;

    doc.setFont("helvetica","normal");doc.setTextColor(...C.mutedTx);
    doc.text("IVA materiales (10%):",totX,y+5);doc.setTextColor(79,70,229);doc.setFont("helvetica","bold");doc.text("Gs. "+fmt(ivaMat),W-M,y+5,{align:"right"});y+=7;
    doc.setFont("helvetica","normal");doc.setTextColor(...C.mutedTx);
    doc.text("IVA mano de obra (5%):",totX,y+5);doc.setTextColor(79,70,229);doc.setFont("helvetica","bold");doc.text("Gs. "+fmt(ivaLab),W-M,y+5,{align:"right"});y+=7;
  }
  if(state.profitPct>0){
    doc.setFont("helvetica","normal");doc.setTextColor(...C.mutedTx);
    doc.text("Honorarios profesionales ("+state.profitPct+"%):",totX,y+5);
    doc.setTextColor(22,163,74);doc.setFont("helvetica","bold");doc.text("Gs. "+fmt(profitAmt),W-M,y+5,{align:"right"});y+=8;
  }
  doc.setDrawColor(...C.accentBg);doc.setLineWidth(0.6);doc.line(totX,y,W-M,y);y+=2;
  doc.setFillColor(...C.totalBg);doc.roundedRect(totX,y,totW,13,2,2,"F");
  doc.setTextColor(...C.totalTx);doc.setFont("helvetica","bold");doc.setFontSize(8);
  doc.text("TOTAL"+(state.ivaEnabled&&state.ivaEnPDF?" (IVA inc.)":"")+":",totX+4,y+8);
  doc.setFontSize(10);doc.text("Gs. "+fmt(total),W-M-3,y+8,{align:"right"});y+=19;
  // Notes
  if(state.notes&&state.notes.trim()){
    if(y+20>275){doc.addPage();y=M;}
    doc.setFontSize(7.5);doc.setFont("helvetica","bold");doc.setTextColor(...C.accentBg);doc.text("NOTAS Y CONDICIONES:",M,y);y+=5;
    doc.setFont("helvetica","normal");doc.setTextColor(...C.mutedTx);
    const nl2=doc.splitTextToSize(state.notes,W-M*2);doc.text(nl2,M,y);
  }
  // Footer
  const pages=doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);doc.setFontSize(6.5);doc.setFont("helvetica","normal");doc.setTextColor(...C.mutedTx);
    doc.setDrawColor(...C.borderC);doc.setLineWidth(0.3);doc.line(M,287,W-M,287);
    doc.text((p.company||"PresupuestadorPY")+(p.ruc?" — RUC: "+p.ruc:""),M,292);
    doc.text("Página "+i+" de "+pages,W-M,292,{align:"right"});
  }
  const fn="Presupuesto_"+String(state.budgetNum).padStart(4,"0")+"_"+(state.clientName||"Cliente").replace(/\s+/g,"_")+".pdf";
  doc.save(fn);toast("PDF generado ✓");
}

function closeModal(){document.getElementById("modal-area").innerHTML="";}
function exportDB(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="presupuestadorpy_db.json";a.click();URL.revokeObjectURL(url);
  toast("DB exportada ✓");
}
function importDB(){
  const inp=document.createElement("input");inp.type="file";inp.accept=".json";
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        // Validar estructura mínima
        if(typeof d!=="object"||!Object.values(d)[0])throw new Error("Formato inválido");
        DB=d;save();renderPrices&&renderPrices();closeModal();toast("DB importada ✓");
      }catch(err){toast("Error al importar: "+err.message,false);}
    };
    reader.readAsText(file);
  };
  inp.click();
}
function doSave(){
  const b={id:state.activeBudgetId||Date.now(),num:state.budgetNum,date:new Date().toLocaleDateString("es-PY"),projectName:state.projectName,clientName:state.clientName,clientAddress:state.clientAddress,clientPhone:state.clientPhone,profitPct:state.profitPct,validDays:state.validDays,ivaEnabled:state.ivaEnabled,items:[...state.items],notes:state.notes};
  const idx=state.budgets.findIndex(x=>x.id===state.activeBudgetId);
  if(idx>=0)state.budgets[idx]=b;else{state.budgets.push(b);state.budgetNum++;}
  state.activeBudgetId=b.id;save();closeModal();toast("Presupuesto guardado ✓");
}
function doLoad(id){
  const b=state.budgets.find(x=>x.id===id);if(!b)return;
  Object.assign(state,{projectName:b.projectName||"",clientName:b.clientName||"",clientAddress:b.clientAddress||"",clientPhone:b.clientPhone||"",profitPct:b.profitPct||0,validDays:b.validDays||30,ivaEnabled:b.ivaEnabled||false,items:b.items||[],notes:b.notes||"",budgetNum:b.num||state.budgetNum,activeBudgetId:b.id});
  closeModal();renderBudget();toast("Presupuesto cargado ✓");
}
function doDeleteBudget(id){state.budgets=state.budgets.filter(b=>b.id!==id);if(state.activeBudgetId===id)state.activeBudgetId=null;save();showModal("load");}
function doSaveProfile(){
  state.profile={company:document.getElementById("p-company").value,professional:document.getElementById("p-prof").value,matricula:document.getElementById("p-mat").value,ruc:document.getElementById("p-ruc").value,phone:document.getElementById("p-phone").value,email:document.getElementById("p-email").value,address:document.getElementById("p-address").value,instagram:document.getElementById("p-ig").value,whatsapp:document.getElementById("p-wa").value,website:document.getElementById("p-web").value};
  save();closeModal();toast("Perfil guardado ✓");
}

    return s+sub;
  },0);
  const avg=total?totalVal/total:0;
  const thisMonth=state.budgets.filter(b=>{
    try{const p=b.date.split("/");const d=new Date(parseInt(p[2]),parseInt(p[1])-1);return d.getMonth()===new Date().getMonth();}catch(e){return false;}
  }).length;
  // Rubros más usados
  const rubros={};
  for(const b of state.budgets)for(const i of b.items){rubros[i.cat]=(rubros[i.cat]||0)+1;}

        <div class="alert-dot ${b.diff<=3?"warn":"ok"}"></div>

      ["REVOQUES","Revoque 1 capa sin hidrófugo",226],["PISOS","Baldosa calcárea 20x20cm",61.5],
      ["PINTURAS","Pintura a la cal",226],["DESAGÜE CLOACAL","Pozo ciego Ø1.50m h=3.00m",1],
    ]},
    {icon:"🏢",name:"Dúplex 120m²",desc:"H°A° losa, mampostería cerámica, teja francesa, revoque hidrófugo, porcelanato, látex.",meta:"~₲ 280.000.000",items:[
      ["ESTRUCTURAS","Zapata fck=18 MPa",1],["ESTRUCTURAS","Columna fck=21 MPa",0.5],
      ["ESTRUCTURAS","Losa Rap h=17cm (12+5)",35],["FUNDACIONES","Cimiento PBC con cal (1/2:1:4)",17.6],
      ["MAMPOSTERÍA","Elevación 0.15m ladrillo cerámico 6 tubos",240],["TECHOS","Teja francesa s/ machimbre",93],
      ["CONTRAPISOS","Contrapiso 10cm cascotes",101],["REVOQUES","Revoque 1 capa hidrófugo 1.5cm",381],
      ["PISOS","Porcelanato 60x60cm",19],["PISOS","Cerámica esmaltada Cecafi 32x57cm",62],
      ["PINTURAS","Látex interior con enduido",381],
    ]},
    {icon:"🏪",name:"Local comercial 100m²",desc:"Estructura H°A°, losa, mampostería hueca, chapa termoacústica, piso hormigón pulido.",meta:"~₲ 220.000.000",items:[
      ["ESTRUCTURAS","Zapata fck=18 MPa",1.5],["ESTRUCTURAS","Columna fck=21 MPa",0.8],
      ["ESTRUCTURAS","Losa fck=21MPa",12.4],["FUNDACIONES","Cimiento PBC sin cal (1:12)",21.8],
      ["MAMPOSTERÍA","Elevación 0.20m ladrillo cerámico hueco",200],["TECHOS","Techo metálico chapa trapezoidal",120],

      ["PISOS","Mosaico granítico gris 30x30cm",42],["PINTURAS","Látex exterior con enduido",480],
    ]},
    {icon:"🏗️",name:"Ampliación 30m²",desc:"Cimiento, mampostería, techo chapa, revoque, piso calcáreo. Sin instalaciones.",meta:"~₲ 45.000.000",items:[
      ["FUNDACIONES","Cimiento PBC con cal (1/2:1:4)",4],["MAMPOSTERÍA","Elevación 0.15m ladrillo común",55],
      ["TECHOS","Chapa Nº28 s/ caños metálicos",35],["CONTRAPISOS","Contrapiso 7cm cascotes",30],
      ["REVOQUES","Revoque 1 capa sin hidrófugo",110],["PISOS","Baldosa calcárea 20x20cm",30],
      ["PINTURAS","Pintura a la cal",110],
    ]},
  ];
  const tmplCards=TEMPLATES.map((t,idx)=>`<div class="tmpl-card" onclick="applyTemplate(${idx})">
    <div class="tmpl-icon">${t.icon}</div>
    <div class="tmpl-name">${t.name}</div>
    <div class="tmpl-desc">${t.desc}</div>

  window._TEMPLATES=TEMPLATES;
  el.innerHTML=`<div class="prices-wrap">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:18px">
      <div class="dash-card"><div class="dash-num">${total}</div><div class="dash-lbl">Presupuestos</div><div class="dash-sub">Total creados</div></div>
      <div class="dash-card"><div class="dash-num" style="font-size:1.2rem">₲ ${total?new Intl.NumberFormat("es-PY").format(Math.round(totalVal/1000000))+"M":"-"}</div><div class="dash-lbl">Valor total</div><div class="dash-sub">Suma de todos</div></div>
      <div class="dash-card"><div class="dash-num" style="font-size:1.2rem">₲ ${total?new Intl.NumberFormat("es-PY").format(Math.round(avg/1000000))+"M":"-"}</div><div class="dash-lbl">Promedio</div><div class="dash-sub">Por presupuesto</div></div>
      <div class="dash-card"><div class="dash-num">${thisMonth}</div><div class="dash-lbl">Este mes</div><div class="dash-sub">Presupuestos creados</div></div>

function applyTemplate(idx){
  const t=window._TEMPLATES[idx];
  if(!confirm('¿Cargar plantilla "'+t.name+'" al presupuesto actual? Se agregarán los ítems.'))return;
  let added=0;
  for(const[cat,name,qty] of t.items){
    if(DB[cat]&&DB[cat][name]){
      const data=DB[cat][name];
      state.items.push({cat,name,unit:data.unit,unitPrice:data.total,matCost:data.matCost,laborCost:data.laborCost,mats:data.mats||[],qty,id:Date.now()+Math.random()+added,disc:0,note:""});
      added++;
    }
  }
  state.m2Area=t.name.includes("60m²")?60:t.name.includes("120m²")?120:t.name.includes("100m²")?100:30;
  setSection("budget");save();renderBudget();
  toast('Plantilla "'+t.name+'" cargada — '+added+' ítems ✓');
}

  } else {

      if(event==='SIGNED_IN') await sbLoadBudgets();
    } else {

      renderUserChip();
    }

})();
